{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Listă Călători</h2>
    <a href="/calatori/adauga" class="btn btn-primary"><i class="fas fa-plus me-2"></i>Adaugă Călător</a>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nume</th>
                    <th>Prenume</th>
                    <th>CNP</th>
                    <th>Email</th>
                    <th>Acțiuni</th>
                </tr>
            </thead>
            <tbody>
                {% for c in calatori %}
                <tr>
                    <td>{{ c.id_calator }}</td>
                    <td class="fw-bold">{{ c.nume }}</td>
                    <td>{{ c.prenume }}</td>
                    <td>{{ c.cnp }}</td>
                    <td>{{ c.email }}</td>
                    <td>
                        <a href="/calatori/editeaza/{{ c.id_calator }}" class="btn btn-sm btn-light text-primary"><i class="fas fa-edit"></i></a>
                        <a href="/calatori/sterge/{{ c.id_calator }}" class="btn btn-sm btn-light text-danger" onclick="return confirm('Sigur ștergi?')"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
