{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0">{{ 'Editează' if calator else 'Adaugă' }} Călător</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Nume</label>
                            <input type="text" name="nume" class="form-control" value="{{ calator.nume if calator }}" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Prenume</label>
                            <input type="text" name="prenume" class="form-control" value="{{ calator.prenume if calator }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CNP</label>
                        <input type="text" name="cnp" class="form-control"
                               value="{{ calator.cnp if calator }}"
                               required
                               minlength="13"
                               maxlength="13"
                               pattern="\d{13}"
                               title="CNP-ul trebuie să aibă exact 13 cifre">
                        <small class="text-muted">Fix 13 cifre.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ calator.email if calator }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data Nașterii</label>
                        <input type="date" name="data_nasterii" class="form-control" value="{{ calator.data_nasterii if calator }}">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Salvează</button>
                    <a href="/calatori" class="btn btn-link w-100 mt-2 text-muted">Anulează</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
