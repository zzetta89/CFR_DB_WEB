{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">{{ 'Editează' if bilet else 'Emite' }} Bilet</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Călător</label>
                            <select name="id_calator" class="form-select" required>
                                <option value="" disabled {{ 'selected' if not bilet }}>Alege călătorul...</option>
                                {% for c in calatori %}
                                    <option value="{{ c.id_calator }}"
                                        {% if bilet and bilet.id_calator == c.id_calator %}selected{% endif %}>
                                        {{ c.nume }} {{ c.prenume }} ({{ c.cnp }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Sucursala Emitentă</label>
                            <select name="id_sucursala" class="form-select" required>
                                <option value="" disabled {{ 'selected' if not bilet }}>Alege sucursala...</option>
                                {% for s in sucursale %}
                                    <option value="{{ s.id_sucursala }}"
                                        {% if bilet and bilet.id_sucursala == s.id_sucursala %}selected{% endif %}>
                                        {{ s.denumire }} - {{ s.oras }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Nr. Tren</label>
                            <input type="text" name="nr_tren" class="form-control" required
                                   value="{{ bilet.nr_tren if bilet }}" placeholder="ex: IR1655">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Nr. Vagon</label>
                            <input type="number" name="nr_vagon" class="form-control" required
                                   value="{{ bilet.nr_vagon if bilet }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Nr. Loc</label>
                            <input type="number" name="nr_loc" class="form-control" required
                                   value="{{ bilet.nr_loc if bilet }}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Plecare din</label>
                            <input type="text" name="plecare" class="form-control" required
                                   value="{{ bilet.plecare if bilet }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Destinație</label>
                            <input type="text" name="destinatie" class="form-control" required
                                   value="{{ bilet.destinatie if bilet }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Data Călătoriei</label>
                        <input type="date" name="data_calatoriei" class="form-control" required
                               value="{{ bilet.data_calatoriei if bilet }}">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success fw-bold">
                            {{ 'Salvează Modificările' if bilet else 'Emite Bilet' }}
                        </button>
                        <a href="/bilete" class="btn btn-light text-muted">Anulează</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
