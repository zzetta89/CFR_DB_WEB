{% extends 'base.html' %}

{% block content %}
<div class="text-center mb-5">
    <h1 class="display-4 fw-bold text-dark">Panou de Control</h1>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card h-100 text-center p-4 hover-shadow">
            <div class="card-body">
                <i class="fas fa-users fa-3x text-primary mb-3"></i>
                <h3 class="card-title">Călători</h3>
                <p class="card-text">Adaugă, modifică sau șterge datele pasagerilor.</p>
                <a href="/calatori" class="btn btn-outline-primary stretched-link">Gestionează</a>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card h-100 text-center p-4">
            <div class="card-body">
                <i class="fas fa-ticket-alt fa-3x text-success mb-3"></i>
                <h3 class="card-title">Bilete</h3>
                <p class="card-text">Emite bilete și verifică locurile rezervate.</p>
                <a href="/bilete" class="btn btn-outline-success stretched-link">Gestionează</a>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card h-100 text-center p-4">
            <div class="card-body">
                <i class="fas fa-building fa-3x text-warning mb-3"></i>
                <h3 class="card-title">Sucursale</h3>
                <p class="card-text">Administrează locațiile și agențiile CFR.</p>
                <a href="/sucursale" class="btn btn-outline-warning stretched-link">Gestionează</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
