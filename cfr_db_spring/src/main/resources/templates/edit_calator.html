<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editare Călător</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3>Modificare Călător</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/calatori/{id}(id=${calator.idCalator})}" th:object="${calator}" method="POST">
                        
                        <div class="mb-3">
                            <label>Nume</label>
                            <input type="text" th:field="*{nume}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label>Prenume</label>
                            <input type="text" th:field="*{prenume}" class="form-control" required/>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-control" 
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" required/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                                Eroare Email
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>CNP</label>
                            <input type="text" th:field="*{cnp}" class="form-control" 
                                   th:classappend="${#fields.hasErrors('cnp')} ? 'is-invalid' : ''" required/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('cnp')}" th:errors="*{cnp}">
                                Eroare CNP
                            </div>
                        </div>

                        <div class="mb-3">
                            <label>Data Nașterii</label>
                            <input type="date" th:field="*{dataNasterii}" class="form-control"/>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Salvează Modificările</button>
                            <a th:href="@{/calatori}" class="btn btn-secondary">Anulează</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
