<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modificare Bilet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning">
            <h3>Modificare Bilet existent</h3>
        </div>
        <div class="card-body">
            
            <form th:action="@{/bilete/{id}(id=${bilet.idBilet})}" th:object="${bilet}" method="POST">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label>Călător</label>
                        <select class="form-select" th:field="*{calator}">
                            <option th:each="c : ${listaCalatori}" th:value="${c.idCalator}" 
                                    th:text="${c.nume + ' ' + c.prenume}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label>Sucursala</label>
                        <select class="form-select" th:field="*{sucursala}">
                            <option th:each="s : ${listaSucursale}" th:value="${s.idSucursala}" 
                                    th:text="${s.denumire}"></option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label>Tren</label>
                        <input type="text" th:field="*{nrTren}" class="form-control" required />
                    </div>
                    <div class="col-md-4">
                        <label>Vagon</label>
                        <input type="number" th:field="*{nrVagon}" class="form-control" required />
                    </div>
                    
                    <div class="col-md-4">
                        <label>Loc</label>
                        <input type="number" th:field="*{nrLoc}" class="form-control" 
                               th:classappend="${#fields.hasErrors('nrLoc')} ? 'is-invalid' : ''" required />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nrLoc')}" th:errors="*{nrLoc}">
                            Loc ocupat!
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label>Plecare</label>
                        <input type="text" th:field="*{plecare}" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <label>Destinație</label>
                        <input type="text" th:field="*{destinatie}" class="form-control" required />
                    </div>
                </div>

                <div class="mb-3">
                    <label>Data</label>
                    <input type="date" th:field="*{dataCalatoriei}" class="form-control" required />
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning">Salvează Modificările</button>
                    <a th:href="@{/bilete}" class="btn btn-secondary">Anulează</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
