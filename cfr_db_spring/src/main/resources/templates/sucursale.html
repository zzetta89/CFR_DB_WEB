<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Management Sucursale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-train"></i> CFR Manager</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/calatori}">Călători</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/sucursale}">Sucursale</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/bilete}">Bilete</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1><i class="fas fa-building"></i> Lista Sucursale</h1>
        <a th:href="@{/sucursale/new}" class="btn btn-success">
            <i class="fas fa-plus"></i> Adaugă Sucursală
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Denumire</th>
                        <th>Oraș</th>
                        <th>Adresă</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sucursala : ${sucursale}">
                        <td th:text="${sucursala.idSucursala}"></td>
                        <td class="fw-bold text-primary" th:text="${sucursala.denumire}"></td>
                        <td th:text="${sucursala.oras}"></td>
                        <td th:text="${sucursala.adresa}"></td>
                        <td>
                            <a th:href="@{/sucursale/edit/{id}(id=${sucursala.idSucursala})}" class="btn btn-primary btn-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/sucursale/delete/{id}(id=${sucursala.idSucursala})}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Sigur ștergi această sucursală?');">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
