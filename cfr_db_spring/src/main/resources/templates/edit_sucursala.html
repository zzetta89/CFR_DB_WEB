<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editare Sucursală</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3>Modificare Sucursală</h3>
                </div>
                <div class="card-body">
                    
                    <form th:action="@{/sucursale/{id}(id=${sucursala.idSucursala})}" th:object="${sucursala}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Denumire Sucursală</label>
                            <input type="text" th:field="*{denumire}" class="form-control" 
                                   th:classappend="${#fields.hasErrors('denumire')} ? 'is-invalid' : ''" required />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('denumire')}" th:errors="*{denumire}">
                                Eroare duplicat
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Oraș</label>
                            <input type="text" th:field="*{oras}" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Adresa Completă</label>
                            <input type="text" th:field="*{adresa}" class="form-control" />
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Salvează Modificările</button>
                            <a th:href="@{/sucursale}" class="btn btn-secondary">Anulează</a>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
