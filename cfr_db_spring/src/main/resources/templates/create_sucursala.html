<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sucursală Nouă</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">CFR Manager</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/sucursale}">Înapoi la Listă</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-success text-white text-center py-3">
                    <h3 class="mb-0">Adăugare Sucursală</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/sucursale}" th:object="${sucursala}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Denumire Sucursală</label>
                            <input type="text" th:field="*{denumire}" class="form-control" 
                                   th:classappend="${#fields.hasErrors('denumire')} ? 'is-invalid' : ''"
                                   placeholder="Ex: Gara de Nord" required />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('denumire')}" th:errors="*{denumire}">
                                Eroare duplicat
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Oraș</label>
                            <input type="text" th:field="*{oras}" class="form-control" placeholder="Ex: București" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Adresa Completă</label>
                            <input type="text" th:field="*{adresa}" class="form-control" placeholder="Ex: Piața Gării nr. 1" />
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Salvează Sucursală</button>
                            <a th:href="@{/sucursale}" class="btn btn-secondary">Anulează</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
