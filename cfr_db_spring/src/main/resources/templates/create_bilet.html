<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Emite Bilet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">CFR Manager</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/bilete}">Înapoi la Listă</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-warning text-dark text-center py-3">
                    <h3 class="mb-0">Emitere Bilet de Călătorie</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/bilete}" th:object="${bilet}" method="POST">
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Selectează Călătorul</label>
                                <select class="form-select" th:field="*{calator}">
                                    <option value="">-- Alege Călător --</option>
                                    <option th:each="c : ${listaCalatori}"
                                            th:value="${c.idCalator}"
                                            th:text="${c.nume + ' ' + c.prenume + ' (' + c.cnp + ')'}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Sucursala Emitentă</label>
                                <select class="form-select" th:field="*{sucursala}">
                                    <option value="">-- Alege Sucursala --</option>
                                    <option th:each="s : ${listaSucursale}"
                                            th:value="${s.idSucursala}"
                                            th:text="${s.denumire + ' - ' + s.oras}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <hr>

                        <h5 class="mb-3">Detalii Tren</h5>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Nr. Tren</label>
                                <input type="text" th:field="*{nrTren}" class="form-control" placeholder="IR-1582" required />
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Nr. Vagon</label>
                                <input type="number" th:field="*{nrVagon}" class="form-control" placeholder="1" required />
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Nr. Loc</label>
                                <input type="number" th:field="*{nrLoc}" class="form-control" 
                                       th:classappend="${#fields.hasErrors('nrLoc')} ? 'is-invalid' : ''"
                                       placeholder="42" required />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nrLoc')}" th:errors="*{nrLoc}">
                                    Loc ocupat!
                                </div>
                            </div>
                        </div>

                        <h5 class="mb-3">Rută și Dată</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Plecare din</label>
                                <input type="text" th:field="*{plecare}" class="form-control" placeholder="Oraș plecare" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Destinație</label>
                                <input type="text" th:field="*{destinatie}" class="form-control" placeholder="Oraș sosire" required />
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Data Călătoriei</label>
                            <input type="date" th:field="*{dataCalatoriei}" class="form-control" required />
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg">Emite Bilet</button>
                            <a th:href="@{/bilete}" class="btn btn-secondary">Anulează</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
