<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Călător Nou</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">CFR Manager</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/calatori}">Înapoi la Listă</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h3 class="mb-0">Înregistrare Călător</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/calatori}" th:object="${calator}" method="POST">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nume</label>
                                <input type="text" th:field="*{nume}" class="form-control" placeholder="Ex: Popescu" required />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prenume</label>
                                <input type="text" th:field="*{prenume}" class="form-control" placeholder="Ex: Ion" required />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" 
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                   placeholder="nume@exemplu.com" required />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                                Eroare Email
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">CNP</label>
                            <input type="text" th:field="*{cnp}" class="form-control" 
                                   th:classappend="${#fields.hasErrors('cnp')} ? 'is-invalid' : ''"
                                   placeholder="Cod Numeric Personal (13 cifre)" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('cnp')}" th:errors="*{cnp}">
                                Eroare CNP
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Data Nașterii</label>
                            <input type="date" th:field="*{dataNasterii}" class="form-control" />
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Salvează Călător</button>
                            <a th:href="@{/calatori}" class="btn btn-secondary">Anulează</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
